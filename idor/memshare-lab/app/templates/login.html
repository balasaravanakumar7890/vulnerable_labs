
<!DOCTYPE html>
<html>
<head>
    <title>MemShare</title>
    <style>
        body { font-family: Arial; margin: 40px auto; max-width: 600px; line-height: 1.6; }
        .memory { border: 1px solid #ddd; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .memory img { max-width: 100%; height: auto; }
        nav { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
        .badge { background: #eee; padding: 3px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Global Feed</a>
        <a href="/profile?user=victim_user">Victim's Profile</a>
        <a href="/profile?user=attacker_user">My Profile (Attacker)</a>
        <a href="/login">Login</a>
    </nav>
    <div id="content">
        
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <p><i>Hint: victim_user / password123 | attacker_user / password123</i></p>
    <script>
        function login() {
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            }).then(res => res.json()).then(data => alert(data.message || data.error));
        }
    </script>

    </div>
</body>
</html>
