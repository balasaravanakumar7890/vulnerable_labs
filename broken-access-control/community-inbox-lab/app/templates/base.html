<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Community Hub{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('inbox') if current_user else url_for('login') }}">Community Hub</a>
    {% if current_user %}
      <nav aria-label="Primary navigation">
        <a href="{{ url_for('inbox') }}">Inbox</a>
        <a href="{{ url_for('sent') }}">Sent</a>
        <a href="{{ url_for('compose') }}">Compose</a>
        <a href="{{ url_for('profile') }}">{{ current_user.username }}</a>
        <form class="inline" method="post" action="{{ url_for('logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="link-button" type="submit">Sign out</button>
        </form>
      </nav>
    {% endif %}
  </header>
  <main class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="notice {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
