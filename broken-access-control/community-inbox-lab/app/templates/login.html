{% extends "base.html" %}
{% block title %}Sign in · Community Hub{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Member network</p>
  <h1>Sign in to Community Hub</h1>
  <p>Access member discussions and direct messages.</p>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Username <input name="username" autocomplete="username" maxlength="32" required></label>
    <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
