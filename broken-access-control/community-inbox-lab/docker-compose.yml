services:
  web:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://community_app:community_app_password@db:5432/community_lab}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-local-development-key-change-before-sharing}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - community-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-community_lab}
      POSTGRES_USER: ${POSTGRES_USER:-community_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-community_app_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - community-network

networks:
  community-network:
    driver: bridge

volumes:
  postgres_data:
